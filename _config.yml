### Step 4 — 이후 글 올리는 방법

`_posts` 폴더에 파일 추가할 때마다 자동으로 목록에 반영됩니다:
```
파일명 규칙: YYYY-MM-DD-제목.md

예: 2026-04-02-두번째-포스트.md
```

파일 상단 형식:
```
---
layout: post
title: "두 번째 개발 일지"
date: 2026-04-02 12:00:00 +0900
---

여기서부터 글 내용 작성...
```

